<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assassin Game</title>
<style>
  body {
    font-family: 'Courier New', monospace;
    background-color: #000;
    color: #fff;
    margin: 0;
    padding: 0;
    min-height: 100vh;
  }
  #container { width: 100%; max-width: 500px; margin: 0 auto; padding: 0 20px; box-sizing: border-box; }
  h2 { text-align: center; }
  .form-section {
    background-color: #222;
    padding: 20px;
    border: 2px solid #fff;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    width: 100%;
    margin-bottom: 20px;
    box-sizing: border-box;
  }
  label { display: block; width: 100%; margin-bottom: 6px; }
  input, select {
    width: 100%;
    padding: 10px;
    border: 2px solid #fff;
    border-radius: 4px;
    background-color: #444;
    color: #fff;
    margin-bottom: 12px;
    box-sizing: border-box;
    font-family: 'Courier New', monospace;
  }
  button {
    padding: 10px;
    border: none;
    border-radius: 4px;
    background-color: #555;
    color: #fff;
    cursor: pointer;
    width: 100%;
    font-family: 'Courier New', monospace;
    margin-top: 6px;
  }
  button:hover { background-color: #444; }
  button:disabled { background-color: #333; cursor: not-allowed; opacity: 0.6; }
  .output {
    margin-top: 12px;
    padding: 10px;
    border: 1px solid #fff;
    background-color: #333;
    border-radius: 4px;
    font-weight: bold;
    white-space: pre-wrap;
    text-align: center;
    display: none;
  }
  .output.error { border-color: #ff5555; color: #ff8888; }
  .output.success { border-color: #55ff55; color: #88ff88; }
  .loading { display: none; text-align: center; margin-top: 10px; }
  .spinner {
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid #fff;
    border-radius: 50%;
    width: 28px; height: 28px;
    animation: spin 1s linear infinite;
    margin: 0 auto 8px;
  }
  @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
  th, td { border: 1px solid #555; padding: 6px; text-align: left; }
  th { background-color: #333; }
  .status-active { color: #88ff88; }
  .status-eliminated { color: #ff8888; }

  #navbar {
    width: 100%;
    box-sizing: border-box;
    text-align: center;
    padding: 10px 0;
    background-color: #111;
    border-bottom: 2px solid #fff;
    margin-bottom: 16px;
  }
  #navbar a {
    display: inline-block;
    color: #fff;
    text-decoration: none;
    padding: 8px 12px;
    border: 1px solid #555;
    border-radius: 4px;
    font-size: 13px;
    margin: 4px;
  }
  #navbar a:hover {
    background-color: #333;
  }

</style>
</head>
<body>
<div id="navbar">
  <a href="?view=signup">Sign Up</a>
  <a href="?view=dashboard">Dashboard</a>
  <a href="?view=feed">Elimination List</a>
</div>
<div id="container">
  <div id="app"></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw776fmUG5Hd7fKAvF8JMGzFLmKQoxBDVi0j_nQiRSnl7tH1KEikLOEU29Tus6bITs8Xg/exec';

// ---- shared fetch helper ----
async function callBackend(action, params = {}) {
  const query = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${SCRIPT_URL}?${query}`);
  if (!res.ok) throw new Error(`Server error (${res.status})`);
  return res.json();
}

function normalizeCodenameInput(value) {
  return value.trim().toLowerCase();
}

function showOutput(el, message, type) {
  el.textContent = message;
  el.className = 'output ' + (type || '');
  el.style.display = 'block';
}

function setLoading(loadingEl, isLoading) {
  loadingEl.style.display = isLoading ? 'block' : 'none';
}

// ---- router ----
const params = new URLSearchParams(window.location.search);
const view = params.get('view');
const app = document.getElementById('app');

if (view === 'signup') renderSignup();
else if (view === 'dashboard') renderDashboard();
else if (view === 'feed') renderFeed();
else if (view === 'admin') renderAdmin();
else renderLanding();

async function renderLanding() {
  app.innerHTML = `<div class="form-section" id="landingBox"><p style="text-align:center;">Loading...</p></div>`;
  const box = document.getElementById('landingBox');
  try {
    const data = await callBackend('getPublicStatus');

    if (data.masterLock === 'TRUE') {
      box.innerHTML = `<p style="text-align:center;">The game is temporarily down. Check back soon.</p>`;
      return;
    }

    const signupOn = data.signupEnabled === 'TRUE';
    const dashboardOn = data.dashboardEnabled === 'TRUE';

    // Only one is on -> skip the landing page entirely and go straight there.
    if (signupOn && !dashboardOn) {
      window.location.href = '?view=signup';
      return;
    }
    if (dashboardOn && !signupOn) {
      window.location.href = '?view=dashboard';
      return;
    }

    // Neither on
    if (!signupOn && !dashboardOn) {
      box.innerHTML = `<p style="text-align:center;">The game isn't accepting signups or dashboard activity right now. Check back soon.</p>`;
      return;
    }

    // Both on -> show a real choice
    let statusMsg = '';
    if (data.gameStatus === 'not_started') statusMsg = 'Signups are open — the game hasn\'t started yet.';
    else if (data.gameStatus === 'live') statusMsg = 'The game is live!';
    else if (data.gameStatus === 'paused') statusMsg = 'The game is currently paused.';
    else if (data.gameStatus === 'ended') statusMsg = 'The game has ended.';

    box.innerHTML = `
      <h2>Assassin Game</h2>
      <p style="text-align:center;">${statusMsg}</p>
      <button onclick="window.location.href='?view=signup'">Sign Up</button>
      <button onclick="window.location.href='?view=dashboard'">I already have a codename</button>
    `;
  } catch (err) {
    box.innerHTML = `<p style="text-align:center; color:#ff8888;">Error loading — please try again.</p>`;
  }
}

// ============================================================
// SIGNUP VIEW
// ============================================================
function renderSignup() {
  app.innerHTML = `
    <h2>Assassins Sign-Up</h2>
    <div class="form-section">
      <label>Codename (letters and numbers only, no spaces):</label>
      <input type="text" id="codename" autocapitalize="off" autocomplete="off" required>
      <label>First and Last Name:</label>
      <input type="text" id="real_name" required>
      <label>Phone:</label>
      <input type="text" id="phone" required>
      <button id="submitBtn">Submit</button>
      <div class="loading" id="loading"><div class="spinner"></div>Submitting...</div>
      <div class="output" id="output"></div>
    </div>
  `;

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const output = document.getElementById('output');
    output.style.display = 'none';

    const codename = normalizeCodenameInput(document.getElementById('codename').value);
    const real_name = document.getElementById('real_name').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!codename || !real_name || !phone) {
      showOutput(output, 'Please fill in all fields.', 'error');
      return;
    }
    if (!/^[a-z0-9]+$/.test(codename)) {
      showOutput(output, 'Codename must contain only letters and numbers, no spaces.', 'error');
      return;
    }

    btn.disabled = true;
    setLoading(loading, true);
    try {
      const data = await callBackend('submitForm', { codename, real_name, phone });
      setLoading(loading, false);
      btn.disabled = false;
      if (data.success) {
        showOutput(output, `Welcome, ${real_name}! Your codename is "${codename}". Screenshot this for your records.`, 'success');
        document.getElementById('codename').value = '';
        document.getElementById('real_name').value = '';
        document.getElementById('phone').value = '';
      } else {
        showOutput(output, data.message, 'error');
      }
    } catch (err) {
      setLoading(loading, false);
      btn.disabled = false;
      showOutput(output, 'Network error — please try again. (' + err.message + ')', 'error');
    }
  });
}

// ============================================================
// DASHBOARD VIEW
// ============================================================
function renderDashboard() {
  app.innerHTML = `
    <h2>Player Dashboard</h2>
    <div class="form-section" id="codenameSection">
      <label>Input your codename:</label>
      <input type="text" id="codename" autocapitalize="off" autocomplete="off" required>
      <button id="verifyBtn">Verify</button>
      <div class="loading" id="verifyLoading"><div class="spinner"></div>Loading...</div>
      <div class="output" id="verifyOutput"></div>
    </div>
    <div class="form-section" id="actionSection" style="display:none;">
      <button id="findTargetBtn">Find My Target</button>
      <button id="eliminateBtn">Eliminate a Player</button>
      <div class="loading" id="actionLoading"><div class="spinner"></div>Loading...</div>
      <div class="output" id="actionOutput"></div>
    </div>
    <div class="form-section" id="eliminateSection" style="display:none;">
      <label>Input target codename:</label>
      <input type="text" id="targetCodename" autocapitalize="off" autocomplete="off" required>
      <button id="confirmStep1Btn">Eliminate</button>
      <div id="confirmStep2" style="display:none;">
        <p style="text-align:center;">Are you sure? This cannot be undone.</p>
        <button id="confirmStep2Btn">Yes, confirm elimination</button>
        <button id="cancelBtn">Cancel</button>
      </div>
      <div class="loading" id="eliminateLoading"><div class="spinner"></div>Processing...</div>
      <div class="output" id="eliminateOutput"></div>
    </div>
  `;

  const getCodename = () => normalizeCodenameInput(document.getElementById('codename').value);

  document.getElementById('verifyBtn').addEventListener('click', async () => {
    const btn = document.getElementById('verifyBtn');
    const loading = document.getElementById('verifyLoading');
    const output = document.getElementById('verifyOutput');
    output.style.display = 'none';

    const codename = getCodename();
    if (!codename) { showOutput(output, 'Please enter your codename.', 'error'); return; }

    btn.disabled = true;
    setLoading(loading, true);
    try {
      const data = await callBackend('verifyCitizen1', { codename });
      setLoading(loading, false);
      btn.disabled = false;
      showOutput(output, data.message, data.success ? 'success' : 'error');
      if (data.success) document.getElementById('actionSection').style.display = 'block';
    } catch (err) {
      setLoading(loading, false);
      btn.disabled = false;
      showOutput(output, 'Network error — please try again.', 'error');
    }
  });

  document.getElementById('findTargetBtn').addEventListener('click', async () => {
    const btn = document.getElementById('findTargetBtn');
    const loading = document.getElementById('actionLoading');
    const output = document.getElementById('actionOutput');
    output.style.display = 'none';

    btn.disabled = true;
    setLoading(loading, true);
    try {
      const data = await callBackend('findMyTarget', { codename: getCodename() });
      setLoading(loading, false);
      btn.disabled = false;
      showOutput(output, data.message, data.success === false ? 'error' : 'success');
    } catch (err) {
      setLoading(loading, false);
      btn.disabled = false;
      showOutput(output, 'Network error — please try again.', 'error');
    }
  });

  document.getElementById('eliminateBtn').addEventListener('click', () => {
    document.getElementById('eliminateSection').style.display = 'block';
  });

  document.getElementById('confirmStep1Btn').addEventListener('click', () => {
    const target = document.getElementById('targetCodename').value.trim();
    if (!target) return;
    document.getElementById('confirmStep2').style.display = 'block';
    document.getElementById('confirmStep1Btn').style.display = 'none';
  });

  document.getElementById('cancelBtn').addEventListener('click', () => {
    document.getElementById('confirmStep2').style.display = 'none';
    document.getElementById('confirmStep1Btn').style.display = 'block';
  });

  document.getElementById('confirmStep2Btn').addEventListener('click', async () => {
    const btn = document.getElementById('confirmStep2Btn');
    const loading = document.getElementById('eliminateLoading');
    const output = document.getElementById('eliminateOutput');
    output.style.display = 'none';

    const targetCodename = normalizeCodenameInput(document.getElementById('targetCodename').value);
    btn.disabled = true;
    setLoading(loading, true);
    try {
      const data = await callBackend('eliminateTarget', { codename: getCodename(), targetCodename });
      setLoading(loading, false);
      btn.disabled = false;
      showOutput(output, data.message, data.success ? 'success' : 'error');
      document.getElementById('confirmStep2').style.display = 'none';
      document.getElementById('confirmStep1Btn').style.display = 'block';
    } catch (err) {
      setLoading(loading, false);
      btn.disabled = false;
      showOutput(output, 'Network error — please try again.', 'error');
    }
  });
}

// ============================================================
// FEED VIEW (public elimination history)
// ============================================================
function renderFeed() {
  app.innerHTML = `
    <h2>Elimination Feed</h2>
    <div class="form-section">
      <button id="refreshBtn">Refresh</button>
      <div class="loading" id="feedLoading"><div class="spinner"></div>Loading...</div>
      <div id="feedList"></div>
    </div>
  `;

  async function load() {
    const loading = document.getElementById('feedLoading');
    const list = document.getElementById('feedList');
    setLoading(loading, true);
    list.innerHTML = '';
    try {
      const data = await callBackend('getPublicFeed');
      setLoading(loading, false);
      if (!data.feed || data.feed.length === 0) {
        list.innerHTML = '<p style="text-align:center;">No eliminations yet.</p>';
        return;
      }
      list.innerHTML = data.feed.map(row =>
        `<div class="output" style="display:block;">${row.details}</div>`
      ).join('');
    } catch (err) {
      setLoading(loading, false);
      list.innerHTML = '<p style="text-align:center; color:#ff8888;">Error loading feed.</p>';
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', load);
  load();
}

// ============================================================
// ADMIN VIEW
// ============================================================
function renderAdmin() {
  app.innerHTML = `
    <h2>Admin Panel</h2>
    <div class="form-section" id="loginSection">
      <label>Admin password:</label>
      <input type="password" id="adminPassword" autocomplete="off">
      <button id="loginBtn">Log In</button>
      <div class="output" id="loginOutput"></div>
    </div>
    <div id="adminContent" style="display:none;"></div>
  `;

  let password = '';

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const output = document.getElementById('loginOutput');
    password = document.getElementById('adminPassword').value;
    try {
      const data = await callBackend('adminLogin', { password });
      if (data.success) {
        document.getElementById('loginSection').style.display = 'none';
        loadAdminContent();
      } else {
        showOutput(output, data.message, 'error');
      }
    } catch (err) {
      showOutput(output, 'Network error.', 'error');
    }
  });

  async function loadAdminContent() {
    const content = document.getElementById('adminContent');
    content.style.display = 'block';
    content.innerHTML = `
      <div class="form-section">
        <h3 style="margin-top:0;">Settings</h3>
        <div id="settingsList">Loading...</div>
      </div>
      <div class="form-section">
        <h3 style="margin-top:0;">Players</h3>
        <div id="playersList">Loading...</div>
      </div>
      <div class="form-section">
        <h3 style="margin-top:0;">Recent Log</h3>
        <div id="logList">Loading...</div>
      </div>
      <div class="form-section" style="border-color:#ff5555; margin-top:40px;">
        <h3 style="margin-top:0; color:#ff8888;">⚠️ Danger Zone</h3>
        <label>Reset password:</label>
        <input type="password" id="resetPasswordInput" autocomplete="off">
        <button id="resetKeepBtn" style="background-color:#663333;">Reset Game (keep players, clear eliminations)</button>
        <button id="resetWipeBtn" style="background-color:#663333; margin-top:10px;">Full Wipe (permanently delete all players)</button>
        <div class="output" id="resetOutput"></div>
      </div>
    `;

    const SELECT_SETTINGS = {
      game_status: ['not_started', 'live', 'paused', 'ended'],
      signup_enabled: ['TRUE', 'FALSE'],
      dashboard_enabled: ['TRUE', 'FALSE'],
      eliminate_enabled: ['TRUE', 'FALSE']
    };

    const settingsData = await callBackend('adminGetSettings', { password });
    const settingsList = document.getElementById('settingsList');
    const editableKeys = ['game_status','signup_enabled','dashboard_enabled','eliminate_enabled',
      'signup_off_message','dashboard_off_message','eliminate_off_message','master_lock_message'];

    settingsList.innerHTML = editableKeys.map(key => {
      const currentValue = settingsData.settings[key] || '';
      if (SELECT_SETTINGS[key]) {
        const buttons = SELECT_SETTINGS[key].map(opt => {
          const isActive = opt === currentValue;
          const style = isActive
            ? 'background-color:#0a7a3a; border:2px solid #fff;'
            : '';
          return `<button type="button" style="width:auto; padding:8px 12px; ${style}" data-select-key="${key}" data-select-value="${opt}">${opt}</button>`;
        }).join('');
        return `<label>${key}</label><div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;">${buttons}</div>`;
      } else {
        return `<label>${key}</label><div style="display:flex; gap:6px;">
          <input type="text" value="${currentValue.replace(/"/g,'&quot;')}" id="setting_${key}" style="flex:1;">
          <button style="width:auto; padding:10px 14px;" data-key="${key}">Save</button>
        </div>`;
      }
    }).join('') + `<p style="font-size:12px; opacity:0.7; text-align:center; margin-top:8px;">master_lock is currently: <b>${settingsData.settings.master_lock}</b> (edit the Sheet directly to change)</p>`;

    settingsList.querySelectorAll('button[data-select-key]').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        await callBackend('adminUpdateSetting', { password, key: btn.dataset.selectKey, value: btn.dataset.selectValue });
        loadAdminContent();
      });
    });

    settingsList.querySelectorAll('button[data-key]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const key = btn.dataset.key;
        const value = document.getElementById(`setting_${key}`).value;
        btn.disabled = true;
        btn.textContent = 'Saving...';
        await callBackend('adminUpdateSetting', { password, key, value });
        btn.textContent = 'Saved!';
        setTimeout(() => { btn.textContent = 'Save'; btn.disabled = false; }, 1200);
      });
    });

    const playersData = await callBackend('adminGetPlayers', { password });
    const playersList = document.getElementById('playersList');
    playersList.innerHTML = `
      <table>
        <tr><th>Codename</th><th>Name</th><th>Status</th><th>Action</th></tr>
        ${playersData.players.map(p => `
          <tr>
            <td>${p.codename}</td>
            <td>${p.name}</td>
            <td class="status-${p.status}">${p.status}</td>
            <td>
              <button style="width:auto; padding:4px 8px; font-size:12px;" data-toggle="${p.codename}" data-newstatus="${p.status === 'active' ? 'eliminated' : 'active'}">
                Mark ${p.status === 'active' ? 'eliminated' : 'active'}
              </button>
            </td>
          </tr>
        `).join('')}
      </table>
    `;
    playersList.querySelectorAll('button[data-toggle]').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        await callBackend('adminSetPlayerStatus', {
          password,
          codename: btn.dataset.toggle,
          status: btn.dataset.newstatus,
          eliminatedBy: 'admin'
        });
        loadAdminContent();
      });
    });

    const logData = await callBackend('adminGetLog', { password });
    const logList = document.getElementById('logList');
    logList.innerHTML = `
      <table>
        <tr><th>Time</th><th>Type</th><th>Who</th><th>Details</th></tr>
        ${logData.log.slice(0, 30).map(r => `
          <tr><td>${r.timestamp}</td><td>${r.eventType}</td><td>${r.codename}</td><td>${r.details}</td></tr>
        `).join('')}
      </table>
    `;

    document.getElementById('resetKeepBtn').addEventListener('click', async () => {
      const resetOutput = document.getElementById('resetOutput');
      const resetPassword = document.getElementById('resetPasswordInput').value;
      if (!resetPassword) { showOutput(resetOutput, 'Enter the reset password first.', 'error'); return; }
      if (!confirm('Are you sure? This will set ALL players back to active and permanently clear elimination history. This cannot be undone.')) return;
      const data = await callBackend('adminResetKeepPlayers', { password, resetPassword });
      showOutput(resetOutput, data.message, data.success ? 'success' : 'error');
      if (data.success) loadAdminContent();
    });

    document.getElementById('resetWipeBtn').addEventListener('click', async () => {
      const resetOutput = document.getElementById('resetOutput');
      const resetPassword = document.getElementById('resetPasswordInput').value;
      if (!resetPassword) { showOutput(resetOutput, 'Enter the reset password first.', 'error'); return; }
      if (!confirm('Are you sure? This will PERMANENTLY DELETE all players. Everyone will need to sign up again. This cannot be undone.')) return;
      const data = await callBackend('adminResetFullWipe', { password, resetPassword });
      showOutput(resetOutput, data.message, data.success ? 'success' : 'error');
      if (data.success) loadAdminContent();
    });
  }
}
</script>
</body>
</html>
